<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dilitant-Dev</title>
  <link rel="stylesheet" href="/src/assets/css/base.css">
  <link rel="stylesheet" href="/src/assets/css/themes.css">
  <link rel="stylesheet" href="/src/assets/css/components.css">
</head>
<body class="theme-forest">
  <div class="app-shell">
    <!-- Поиск и хранилище -->
    <div id="globalSearchContainer" class="global-search-container"></div>
    <div id="fsIndicatorContainer" class="fs-indicator-container"></div>

    <!-- Заголовок страницы (для Подвала, Полигона) -->
    <div id="pageTitle" class="page-title" style="display:none;"></div>

    <!-- Стартовый контент -->
    <div id="startContent" class="start-content"></div>

    <!-- Рабочая зона -->
    <main id="workspace" class="workspace"></main>

    <!-- Фиксированные углы -->
    <div class="fixed-bottom-left" id="themeSwitcherContainer"></div>
    <div class="fixed-bottom-right">
      <div class="sub-tab" id="backBtn" style="display:none;">вернуться</div>
      <div class="sub-tab" id="settingsBtn">настройки</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
