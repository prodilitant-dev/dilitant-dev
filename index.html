<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dilitant-Dev</title>
  <link rel="stylesheet" href="/src/assets/css/base.css">
  <link rel="stylesheet" href="/src/assets/css/themes.css">
  <link rel="stylesheet" href="/src/assets/css/components.css">
</head>
<body class="theme-forest">
  <div id="app">
    <!-- Хранилище (правый верхний угол) -->
    <div class="storage-indicator" id="storageIndicator">
      <span id="storagePath">Хранилище</span>
    </div>

    <!-- Поиск и заголовок (скрыты на главной, показываются на других) -->
    <div id="globalSearchContainer" style="display:none; position:fixed; top:20px; left:20px; z-index:200;"></div>
    <div id="glowTitleContainer" style="display:none; position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:200;"></div>

    <!-- Рабочая область (для контента страниц) -->
    <main id="workspace"></main>

    <!-- Нижние кнопки -->
    <div class="fixed-bottom-left" id="themeSwitcherContainer"></div>
    <div class="fixed-bottom-right">
      <div class="sub-tab" id="backBtn" style="display:none;">вернуться</div>
      <div class="sub-tab" id="settingsBtn">настройки</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
